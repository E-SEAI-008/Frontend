<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>multi-page</title>
  </head>
  <body>
    <div class="header">
     
        <ul>
          <li><a href="../../index.html">Home</a></li>
          <li><a href="./about.html">About us</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      
    </div>
    <div class="main">
      <h1>Contact Us</h1>
      <div id="contactData">
        <ul>
          <li>Email: <a href="mailto:coffeeshop@gmail.com">coffeeshop@gmail.com</a></li>
          <li>Phone: <a href="tel:+11145324455">+11145324455</a></li>
        </ul>
      </div>
      <div id="image">
          <img src="../assets/coffeeMugBlue.jpg" alt="Blue Coffee Mug" width="30%" />
      </div>
      <div id="contactForm">
        <form>
          <fieldset>
            <legend>Write us a message</legend>
            <label for="fullName"
              >Full Name: <input id="fullName" type="text" name="fullName" placeholder="Add your name..." required
            /></label>
            <br />
            <br />
            <label for="email"
              >Email: <input id="email" type="email" name="email" placeholder="Add your email..." required />
            </label>
            <br />
            <br />
            <label for="message">Message: </label>
            <br />
            <textarea name="message" id="message" cols="30" rows="5"></textarea>
          </fieldset>
          <button type="submit">Send</button>
        </form>
      </div>
    </div>
    <div class="footer">
        <p>Copyright 2026</p>
    </div>
  </body>
</html>
