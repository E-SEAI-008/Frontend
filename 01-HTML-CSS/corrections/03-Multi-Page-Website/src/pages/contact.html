<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-page website</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
            <li><a href="../../index.html">Home</a></li>
            <li><a href="./about.html">About us</a></li>
            <li><a href="#">Contact us</a></li>
        </ul>
      </nav>
    </header>
    <main>
         <h1>Contact us</h1>
         <section>
            <ul>
                <li><a href="mailto:coffeeshop@gmail.com">coffeeshop@gmail.com</a></li>
                <li><a href="tel:+111555666">+111555666</a></li>
            </ul>
         </section>
         <section>
            <figure>
                <img src="../assets/coffeeArt.jpg" alt="coffee mug" width="20%">
            </figure>
            <form>
                <fieldset>
                    <legend>Write us a message</legend>
                    <div>
                        <label for="name">Name:</label>
                        <input type="text" name="name" id="name" placeholder="Name..." required>
                    </div>
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" placeholder="Email..." required>
                    </div>
                    <div>
                        <label for="message">Message:</label>
                        <textarea name="message" id="message" cols="40" rows="10"></textarea>
                    </div>
                </fieldset>
                <button type="submit">Send</button>
            </form>
         </section>
    </main>
    <footer>
        <p>Copyright 2026</p>
    </footer>
  </body>
</html>
